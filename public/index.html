<!DOCTYPE html>
<html>
<head>
    <title>ALPHA-GEN | Link</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 1px solid #00ff41; padding: 40px; border-radius: 10px; box-shadow: 0 0 20px #00ff4133; text-align: center; width: 90%; max-width: 400px; }
        input { background: #111; border: 1px solid #00ff41; color: #fff; padding: 12px; width: 80%; margin-bottom: 20px; text-align: center; }
        button { background: #00ff41; color: #000; padding: 12px 25px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #00cc33; }
        #result { margin-top: 30px; font-size: 2rem; letter-spacing: 8px; font-weight: bold; }
        p { font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ALPHA-GEN LINK</h2>
        <p>Enter number with country code (e.g., 23350...)</p>
        <input type="text" id="num" placeholder="233xxxxxxxxx">
        <br>
        <button onclick="getCode()">Get Code</button>
        <div id="result">---- ----</div>
    </div>

    <script>
        async function getCode() {
            const num = document.getElementById('num').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "WAIT...";
            try {
                const response = await fetch(`/get-code?number=${num}`);
                const data = await response.json();
                if (data.code) {
                    resDiv.innerText = data.code;
                } else {
                    resDiv.innerText = "ERROR";
                }
            } catch (err) {
                resDiv.innerText = "RETRY";
            }
        }
    </script>
</body>
</html>
